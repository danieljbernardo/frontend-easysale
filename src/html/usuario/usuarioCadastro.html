<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro Usuário</title>
    <link
      rel="icon"
      href="../../imagens/logo32x.png"
      type="image/png"
      sizes="32x32"
    />
    <link
      rel="icon"
      href="../../imagens/logo16x.png"
      type="image/png"
      sizes="16x16"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./css/usuarioCadastroStyle.css" />
    <title>Easy Sale</title>
  </head>
  <body>

    <div class="container mt-5 p-4 border rounded">

        <form>

        <label for="nome">Nome:</label>
        <input type="text" placeholder="Digite seu nome completo" class="form-control mb-3" id="nome" />
        
        <label for="cpf">CPF:</label>
        <input type="text" placeholder="Digite seu CPF" class="form-control mb-3" id="cpf" />

        <label for="email">Email:</label>
        <input type="text" placeholder="Digite seu email" class="form-control mb-3" id="email" />

        <label for="senha">Senha:</label>
        <input type="password" placeholder="Digite sua senha" id="senha" class="form-control mb-3">

        <label for="confirmarSenha">Confirmar Senha:</label>
        <input type="password" placeholder="Confirme sua senha" id="confirmarSenha" class="form-control mb-3">

        <div class="container-fluid align-content-between">
        <label for="tipo">Tipo de Usuário:</label> 
        <input type="radio" id="tipo" value="USER">Vendedor
        <input type="radio" id="tipo" value="ADMIN">Administrador
        </div>

        <button type="button" class="btn btn-primary mt-3">Cadastrar</button>
        
        </form>



    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
