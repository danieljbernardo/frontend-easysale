<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Usuário</title>
    <link
      rel="icon"
      href="../../imagens/logo32x.png"
      type="image/png"
      sizes="32x32"
    />
    <link
      rel="icon"
      href="../../imagens/logo16x.png"
      type="image/png"
      sizes="16x16"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="../../css/usuarioStyle.css" />
    <title>Easy Sale</title>
  </head>
  <body class="login">
    <div class="aviso-mobile">
      <div class="aviso-box">
        <h2><span class="easy">Easy</span><span class="sale">Sale</span></h2>
        <p>Este sistema só pode ser utilizado em computadores.</p>
        <p>Por favor acesse usando um notebook ou desktop.</p>
      </div>
    </div>

    <div class="layout">
      <div class="lado-esquerdo">
        <a href="../../index.html"
          ><i class="bi bi-arrow-left-circle-fill" tabindex="5"></i
        ></a>
        <div><span class="easy">Easy</span><span class="sale">Sale</span></div>
      </div>


      <div class="container p-4 formulario">

        <form style="margin-top: 20%;">

         <h1 class="text-center mb-4">LOGIN</h1>

          <label for="email">Email:</label>
          <input
            type="text"
            placeholder="Digite seu email"
            class="form-control mb-4"
            id="email"
            name="email"
            autofocus
            tabindex="1"
          />

          <div class="mb-4">
            <label for="senha">Senha:</label>

            <div class="campo-senha">
              <input
                type="password"
                placeholder="Digite sua senha"
                id="senha"
                name="senha"
                class="form-control"
                tabindex="2"
                maxlength="30"
              /> 

              <i class="bi bi-eye-fill olho-senha toggle-senha" data-target="senha"></i>
            </div>
          </div> 

          <div class="w-50 mx-auto text-center" style="margin-top: 20%;">
            <button
              type="button"
              class="btn btn-dark mt-3 mb-2 w-50"
              tabindex="3"
              id="logarUsuario"
              >
              Entrar
            </button>
            <p class="link-cadastro">
              Ainda não possui Login?
              <a href="./usuarioCadastro.html" class="link-verde" tabindex="4"
                >Clique aqui</a
              >
            </p>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/usuario/usuarioLoginScript.js"></script>
  </body>
</html>
